    :root {

      --bg: #eef4f1;

      --ink: #10231f;
      --muted: #465e57;
      --line: #c6d6cf;
      --accent: #0b5f4a;
      --accent-soft: #dceee7;
      --accent-mid: #b8d8cd;

    *, *::before, *::after { box-sizing: border-box; }
    body {

      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }
    .app {
      display: grid;
      grid-template-columns: minmax(280px, 340px) 1fr;
      min-height: 100vh;
    }
    aside {

      background: #f8fbf9;
      padding: 22px;
      overflow: auto;
    }
    main {
      padding: 28px;
      overflow: auto;
    }
    h1, h2, h3, p { margin: 0; }
    h1 {
      font-size: 1.55rem;
      line-height: 1.08;
      letter-spacing: 0;
      text-wrap: balance;
    }
    h2 {
      font-size: 1.65rem;
      line-height: 1.16;
      letter-spacing: 0;
      text-wrap: balance;
    }
    h3 {
      font-size: 1rem;
      line-height: 1.25;
    }
    .sidebar-copy {
      margin-top: 9px;

      font-size: 0.92rem;
      line-height: 1.5;
      text-wrap: pretty;
    }
    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }
    .picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 22px;
    }
    .picker-title {
      font-size: 0.88rem;
      font-weight: 750;
    }
    .match-filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 4px;
    }
    .filter-button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 0.72rem;
      font-weight: 650;
      line-height: 1.2;
      padding: 5px 7px;
    }
    .filter-button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
    }
    .legend {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.25;
    }
    .sidebar-legend {
      margin-top: 16px;
      padding: 10px 0 2px;
    }
    .legend-scale {
      display: grid;
      grid-template-columns: repeat(4, 22px);
      gap: 4px;
    }
    .legend-swatch {
      display: block;
      height: 10px;
      border: 1px solid rgba(var(--heat), 0.3);
      border-radius: 999px;
      background: rgba(var(--heat), var(--alpha));
    }
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      max-height: calc(100vh - 230px);
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 2px;
    }
    .match-button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      padding: 12px;
      text-align: left;
      transition:
        background-color 180ms ease,
        border-color 180ms ease,
        color 180ms ease,
        transform 180ms ease;
    }
    .match-button:hover, .match-button:focus-visible {
      border-color: var(--accent);
      outline: none;
      transform: translateY(-1px);
    }
    .match-button:focus-visible {
      box-shadow: 0 0 0 3px var(--accent-mid);
    }
    .match-button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
    }
    .match-button strong {
      display: block;
      font-size: 0.94rem;
      line-height: 1.25;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .match-button-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.76rem;
      margin-top: 8px;
      color: var(--muted);
    }
    .match-button.active .match-button-meta {
      color: rgba(255, 255, 255, 0.82);
    }
    .match-button-score {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 9px;
      padding-top: 9px;
      border-top: 1px solid rgba(70, 94, 87, 0.18);
      font-size: 0.78rem;
      line-height: 1.25;
      color: var(--ink);
      font-weight: 750;
    }
    .match-button-score span:last-child {
      color: var(--muted);
      font-weight: 650;
      white-space: nowrap;
    }
    .match-button.active .match-button-score {
      border-top-color: rgba(255, 255, 255, 0.24);
      color: var(--accent-ink);
    }
    .match-button.active .match-button-score span:last-child {
      color: rgba(255, 255, 255, 0.78);
    }
    .kind-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      background: #f2f7f4;
      color: var(--muted);
      white-space: nowrap;
    }
    .match-button.active .kind-pill {
      border-color: rgba(255, 255, 255, 0.36);
      background: rgba(255, 255, 255, 0.14);
      color: var(--accent-ink);
    }
    .detail-stack {
      max-width: 980px;
    }
    .score-comparison {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      max-width: 760px;
      margin-top: 16px;
    }
    .score-comparison.has-actual {
      grid-template-columns: minmax(0, 1fr) minmax(190px, 0.48fr);
    }
    .score-callout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      justify-content: space-between;
      gap: 12px 24px;
      border: 1px solid var(--accent-mid);
      border-left: 6px solid var(--accent);
      border-radius: 12px;
      background: var(--panel);
      padding: 18px 20px;
    }
    .score-callout-label {
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 750;
    }
    .score-callout-value {
      margin-top: 4px;
      font-size: 3.15rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }
    .score-callout-teams {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.35;
      font-weight: 650;
      overflow-wrap: anywhere;
    }
    .score-callout-chance {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.35;
      text-align: right;
    }
    .actual-score-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 18px;
    }
    .actual-score-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }
    .actual-score-value {
      margin-top: 7px;
      font-size: 2.45rem;
      line-height: 1;
      font-weight: 800;
    }
    .actual-score-teams {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.35;
      font-weight: 650;
      overflow-wrap: anywhere;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    .tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-size: 0.86rem;
      padding: 7px 12px;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
    }
    .tab:focus-visible {
      outline: 3px solid var(--accent-mid);
      outline-offset: 2px;
    }
    .match-summary {
      margin-top: 16px;
      max-width: 70ch;
      color: var(--ink);
      font-size: 0.95rem;
      line-height: 1.5;
      text-wrap: pretty;
    }
    .methodology {
      margin-top: 16px;
      max-width: 72ch;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      padding: 16px;
    }
    .methodology p + p { margin-top: 10px; }
    .model-flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 8px;
      margin: 16px 0;
    }
    .model-step {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f7fbf9;
      padding: 12px;
    }
    .model-step strong {
      display: block;
      font-size: 0.88rem;
      line-height: 1.25;
    }
    .model-step span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }
    .method-visuals {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(220px, 0.85fr);
      gap: 14px;
      margin-top: 14px;
    }
    .method-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fbf9;
      padding: 14px;
    }

      display: grid;
      gap: 7px;

      grid-template-columns: 54px 1fr 48px;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;

      background: var(--accent-soft);
      overflow: hidden;

    .bar-fill {

      border-radius: inherit;
      background: var(--accent);

      grid-template-columns: repeat(var(--mini-cols), 1fr);
      gap: 2px;

      margin-top: 10px;

    .market-read-source {
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 650;
    }
    .heatmap-intro {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      max-width: 760px;
      margin-bottom: 10px;

    .heatmap-note {

      font-size: 0.82rem;
      line-height: 1.4;
      text-align: right;

      overflow-x: auto;
      padding-bottom: 2px;
    }
    .score-heatmap {
      display: grid;
      grid-template-columns: 54px repeat(var(--cols), minmax(54px, 1fr));
      max-width: 760px;
      border: 1px solid var(--line);
      background: var(--line);
      gap: 1px;
      border-radius: 10px;

    .probability {

      h1 { font-size: 1.38rem; }
      h2 { font-size: 1.35rem; }
      .score-callout {
        align-items: flex-start;

      .score-comparison.has-actual { grid-template-columns: 1fr; }
      .score-callout-chance { text-align: left; }
      .heatmap-intro {
        align-items: flex-start;

      .heatmap-note { text-align: left; }
      .match-list { max-height: 220px; }

      .score-heatmap {
        grid-template-columns: 42px repeat(var(--cols), minmax(42px, 1fr));
      }
      .cell {
        min-height: 42px;
        font-size: 0.68rem;
      }
    }

      );
      const awayGoals = match.score_grid[0].map((_, away) =>
        match.score_grid.reduce((total, row) => total + row[away], 0)
      );
      const visibleGoals = Math.min(5, homeGoals.length);
      for (let goal = 0; goal < visibleGoals; goal += 1) {
        bars.appendChild(goalBar(`${goal} goals`, homeGoals[goal], match.home_team));
        bars.appendChild(goalBar(`${goal} goals`, awayGoals[goal], match.away_team));
      }
      card.appendChild(bars);
      return card;
    }

    function goalBar(label, probability, team) {
      const row = document.createElement("div");
      row.className = "goal-bar-row";
      const labelNode = document.createElement("span");
      labelNode.textContent = label;
      row.appendChild(labelNode);
      const track = document.createElement("span");
      track.className = "bar-track";
      track.title = `${team} ${label}: ${pct(probability)}`;
      const fill = document.createElement("span");
      fill.className = "bar-fill";
      fill.style.width = `${Math.min(100, probability * 100).toFixed(1)}%`;
      track.appendChild(fill);
      row.appendChild(track);
      const value = document.createElement("span");
      value.textContent = pct(probability);
      row.appendChild(value);
      return row;
    }

    function renderMiniHeatmap(match) {
      const card = document.createElement("div");
      card.className = "method-card";
      const title = document.createElement("h3");
      title.textContent = "Score grid";
      card.appendChild(title);
      const grid = document.createElement("div");
      grid.className = "mini-heatmap";
      const rows = Math.min(5, match.score_grid.length);
      const cols = Math.min(5, match.score_grid[0].length);
      grid.style.setProperty("--mini-cols", String(cols));
      const maxProbability = match.peak_score.probability;
      for (let home = 0; home < rows; home += 1) {
        for (let away = 0; away < cols; away += 1) {
          const probability = match.score_grid[home][away];
          const cell = document.createElement("span");
          cell.className = "mini-cell";
          const alpha = heatAlpha(probability, maxProbability);
          cell.style.setProperty("--alpha", String(alpha));
          cell.style.background = alpha === 0 ? "var(--panel)" : `rgba(var(--heat), ${alpha})`;
          cell.title = `${home}-${away}: ${pct(probability)}`;
          grid.appendChild(cell);
        }
      }
      card.appendChild(grid);
      return card;
    }

    function matchSummary(match) {
      if (hasPlaceholderTeam(match)) {
        return "This knockout slot depends on group results, so the model waits for " +
          "confirmed countries before showing probabilities.";
      }
      const outcomes = [
        {label: `${match.home_team} win`, value: match.home_win},
        {label: "Draw", value: match.draw},
        {label: `${match.away_team} win`, value: match.away_win},
      ];
      const leader = outcomes.reduce((best, outcome) =>
        outcome.value > best.value ? outcome : best
      );
      const score = `${match.peak_score.home}-${match.peak_score.away}`;
      const bttsText = match.btts_yes >= 0.5
        ? `Both teams scoring is more likely than not at ${pct(match.btts_yes)}.`
        : `The model leans against both teams scoring at ${pct(match.btts_no)}.`;
      return `${leader.label} is the strongest result at ${pct(leader.value)}. ` +
        `The most likely score is ${score} at ${pct(match.peak_score.probability)}. ` +
        bttsText;
    }

    function hasPlaceholderTeam(match) {
      return [match.home_team, match.away_team].some((team) =>
        /\bgroup [a-l]\b|runner|third place/i.test(team)
      );
    }

    function metric(label, value) {
      const container = document.createElement("div");
      container.className = "metric";

      const labelNode = document.createElement("span");
      labelNode.textContent = label;
      container.appendChild(labelNode);

      const valueNode = document.createElement("strong");
      valueNode.textContent = pct(value);
      container.appendChild(valueNode);
      return container;
    }

    function cell(text, className) {
      const node = document.createElement("div");
      node.className = `cell ${className}`;
      node.textContent = text;
      return node;
    }

    renderMatch(0);
  </script>
</body>
</html>
