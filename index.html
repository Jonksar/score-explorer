      margin-top: 16px;

      scoreTeams.className = "score-callout-teams";
      scoreTeams.textContent =
        `${match.home_team} ${match.peak_score.home} · ` +
        `${match.away_team} ${match.peak_score.away}`;
      scoreMain.appendChild(scoreTeams);
      scoreCallout.appendChild(scoreMain);
      const scoreChance = document.createElement("p");
      scoreChance.className = "score-callout-chance";
      scoreChance.textContent = match.actual_score
        ? `Model prediction · ${pct(match.peak_score.probability)} chance`
        : `${pct(match.peak_score.probability)} chance from the model`;
      scoreCallout.appendChild(scoreChance);
      scoreCallout.setAttribute(
        "aria-label",
        `Most likely score ${match.peak_score.home}-${match.peak_score.away} ` +
          `with ${pct(match.peak_score.probability)} chance from the model`,
      );
      scoreComparison.appendChild(scoreCallout);
      if (match.actual_score) {
        scoreComparison.appendChild(renderActualScore(match));
      }
      detail.appendChild(scoreComparison);

      const summaryCopy = document.createElement("p");
      summaryCopy.className = "match-summary";
      summaryCopy.textContent = matchSummary(match);
      detail.appendChild(summaryCopy);

      const summary = document.createElement("div");
      summary.className = "summary";
      summary.appendChild(metric(`${match.home_team} win`, match.home_win));
      summary.appendChild(metric("Draw", match.draw));
      summary.appendChild(metric(`${match.away_team} win`, match.away_win));
      summary.appendChild(metric("Both teams score", match.btts_yes));
      summary.appendChild(metric("One or both score 0", match.btts_no));
      detail.appendChild(summary);
      detail.appendChild(renderMarketRead(match));

      const heatmapIntro = document.createElement("div");
      heatmapIntro.className = "heatmap-intro";
      const heatmapTitle = document.createElement("h3");
      heatmapTitle.textContent = "Joonatan's prediction model";
      heatmapIntro.appendChild(heatmapTitle);
      const heatmapNote = document.createElement("p");
      heatmapNote.className = "heatmap-note";
      heatmapNote.textContent =
        `${match.home_team} goals run down. ${match.away_team} goals run across.`;
      heatmapIntro.appendChild(heatmapNote);
      detail.appendChild(heatmapIntro);

      const heatmapScroll = document.createElement("div");
      heatmapScroll.className = "heatmap-scroll";
      detail.appendChild(heatmapScroll);

      const heatmap = document.createElement("div");
      heatmap.className = "score-heatmap";
      heatmap.style.setProperty("--cols", String(cols));
      heatmap.id = "heatmap";
      heatmap.setAttribute(
        "aria-label",
        `Score chance heatmap. Rows are ${match.home_team} goals ` +
          `and columns are ${match.away_team} goals.`,
      );
      heatmapScroll.appendChild(heatmap);

      heatmap.appendChild(cell("Goals", "axis"));
      for (let away = 0; away < cols; away += 1) {
        heatmap.appendChild(cell(String(away), "axis"));
      }
      match.score_grid.forEach((row, home) => {
        heatmap.appendChild(cell(String(home), "axis"));
        row.forEach((probability, away) => {
          const node = cell(`${home}-${away}\n${pct(probability)}`, "probability");
          const alpha = heatAlpha(probability, maxProbability);
          node.style.background = alpha === 0 ? "var(--panel)" : `rgba(var(--heat), ${alpha})`;
          node.title = `${home}-${away}: ${pct(probability)}`;
          if (home === match.peak_score.home && away === match.peak_score.away) {
            node.classList.add("highest-probability");
          }
          heatmap.appendChild(node);
        });
      });
    }

    function renderMarketRead(match) {
      const read = match.market_read || {};
      const card = document.createElement("section");
      card.className = "market-read";
      card.setAttribute("aria-label", "Betting market read");

      const title = document.createElement("h3");
      title.textContent = "Betting market read";
      card.appendChild(title);

      if (read.updated_at) {
        const meta = document.createElement("p");
        meta.className = "market-read-meta";
        meta.textContent = `Updated ${read.updated_at}`;
        card.appendChild(meta);
      }

      const summary = document.createElement("p");
      summary.textContent =
        typeof read.summary === "string" && read.summary.trim()
          ? read.summary
          : "No researched market read has been published for this match yet.";
      card.appendChild(summary);

      const bullets = Array.isArray(read.bullets)
        ? read.bullets.filter((item) => typeof item === "string" && item.trim())
        : [];
      if (bullets.length > 0) {
        const listNode = document.createElement("ul");
        bullets.forEach((item) => {
          const bullet = document.createElement("li");
          bullet.textContent = item;
          listNode.appendChild(bullet);
        });
        card.appendChild(listNode);
      }

      const sources = Array.isArray(read.sources) ? read.sources : [];
      const sourceList = document.createElement("div");
      sourceList.className = "market-read-sources";
      sources.forEach((source) => {
        const url = safeHttpUrl(source && source.url);
        if (!url) {
          return;
        }
        const link = document.createElement("a");
        link.className = "market-read-source";
        link.href = url;
        link.target = "_blank";
        link.rel = "noopener";
        link.textContent =
          typeof source.label === "string" && source.label.trim() ? source.label : url;
        sourceList.appendChild(link);
      });
      if (sourceList.children.length > 0) {
        card.appendChild(sourceList);
      }

      const note = document.createElement("p");
      note.className = "market-read-note";
      note.textContent = "Not betting advice. Public market prices can move quickly.";
      card.appendChild(note);
      return card;
    }

    function renderActualScore(match) {
      const card = document.createElement("div");
      card.className = "actual-score-card";
      const label = document.createElement("div");
      label.className = "actual-score-label";
      label.textContent = "Actual score";
      card.appendChild(label);

      const value = document.createElement("div");
      value.className = "actual-score-value";
      value.textContent = actualScoreText(match);
      card.appendChild(value);

      const teams = document.createElement("div");
      teams.className = "actual-score-teams";
      teams.textContent =
        `${match.home_team} ${match.actual_score.home} · ` +
        `${match.away_team} ${match.actual_score.away}`;
      card.appendChild(teams);
      return card;
    }

    function safeHttpUrl(raw) {
      try {
        const url = new URL(String(raw));
        return ["http:", "https:"].includes(url.protocol) ? url.href : null;
      } catch {
        return null;
      }
    }

    function renderTabs(index) {
      const tabs = document.createElement("div");
      tabs.className = "tabs";
      tabs.setAttribute("role", "tablist");
      tabs.appendChild(tabButton("Prediction", "prediction", index));
      tabs.appendChild(tabButton("Methodology", "methodology", index));
      detail.appendChild(tabs);
    }

    function tabButton(label, tabName, index) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `tab${selectedTab === tabName ? " active" : ""}`;
      button.textContent = label;
      button.setAttribute("role", "tab");
      button.setAttribute("aria-selected", selectedTab === tabName ? "true" : "false");
      button.addEventListener("click", () => {
        selectedTab = tabName;
        renderMatch(index);
      });
      return button;
    }

    function renderMethodology(match) {
      const panel = document.createElement("div");
      panel.className = "methodology";
      const title = document.createElement("h3");
      title.textContent = "How this model turns scores into chances";
      panel.appendChild(title);

      [
        "This explorer uses an independent Poisson score model.",
        `For ${match.home_team} vs ${match.away_team}, it trains only on scored matches ` +
          `dated before ${match.date}.`,
      ].forEach((text) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = text;
        panel.appendChild(paragraph);
      });

      const flow = document.createElement("div");
      flow.className = "model-flow";
      [
        ["Past scores", "Use only matches before this date."],
        ["Scoring rates", "Estimate how often each side scores and concedes."],
        ["Poisson curves", "Turn goal rates into 0, 1, 2, 3... goal chances."],
        [
          "Score grid",
          `Combine ${match.home_team} and ${match.away_team} goal chances into exact scores.`,
        ],
      ].forEach(([heading, copy]) => {
        const step = document.createElement("div");
        step.className = "model-step";
        const strong = document.createElement("strong");
        strong.textContent = heading;
        step.appendChild(strong);
        const span = document.createElement("span");
        span.textContent = copy;
        step.appendChild(span);
        flow.appendChild(step);
      });
      panel.appendChild(flow);

      const visuals = document.createElement("div");
      visuals.className = "method-visuals";
      visuals.appendChild(renderGoalBars(match));
      visuals.appendChild(renderMiniHeatmap(match));
      panel.appendChild(visuals);

      [
        `The heatmap shows exact-score probabilities. ${match.home_team} goals run ` +
          `down the rows; ${match.away_team} goals run across the columns.`,
        "The numbers are model probabilities, not betting advice or proof of an edge.",
      ].forEach((text) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = text;
        panel.appendChild(paragraph);
      });
      detail.appendChild(panel);
    }

    function renderGoalBars(match) {
      const card = document.createElement("div");
      card.className = "method-card";
      const title = document.createElement("h3");
      title.textContent = "Goal curves";
      card.appendChild(title);
      const bars = document.createElement("div");
      bars.className = "goal-bars";
      const homeGoals = match.score_grid.map((row) =>
        row.reduce((total, probability) => total + probability, 0)
      );
      const awayGoals = match.score_grid[0].map((_, away) =>
        match.score_grid.reduce((total, row) => total + row[away], 0)
      );
      const visibleGoals = Math.min(5, homeGoals.length);
      for (let goal = 0; goal < visibleGoals; goal += 1) {
        bars.appendChild(goalBar(`${goal} goals`, homeGoals[goal], match.home_team));
        bars.appendChild(goalBar(`${goal} goals`, awayGoals[goal], match.away_team));
      }
      card.appendChild(bars);
      return card;
    }

    function goalBar(label, probability, team) {
      const row = document.createElement("div");
      row.className = "goal-bar-row";
      const labelNode = document.createElement("span");
      labelNode.textContent = label;
      row.appendChild(labelNode);
      const track = document.createElement("span");
      track.className = "bar-track";
      track.title = `${team} ${label}: ${pct(probability)}`;
      const fill = document.createElement("span");
      fill.className = "bar-fill";
      fill.style.width = `${Math.min(100, probability * 100).toFixed(1)}%`;
      track.appendChild(fill);
      row.appendChild(track);
      const value = document.createElement("span");
      value.textContent = pct(probability);
      row.appendChild(value);
      return row;
    }

    function renderMiniHeatmap(match) {
      const card = document.createElement("div");
      card.className = "method-card";
      const title = document.createElement("h3");
      title.textContent = "Score grid";
      card.appendChild(title);
      const grid = document.createElement("div");
      grid.className = "mini-heatmap";
      const rows = Math.min(5, match.score_grid.length);
      const cols = Math.min(5, match.score_grid[0].length);
      grid.style.setProperty("--mini-cols", String(cols));
      const maxProbability = match.peak_score.probability;
      for (let home = 0; home < rows; home += 1) {
        for (let away = 0; away < cols; away += 1) {
          const probability = match.score_grid[home][away];
          const cell = document.createElement("span");
          cell.className = "mini-cell";
          const alpha = heatAlpha(probability, maxProbability);
          cell.style.setProperty("--alpha", String(alpha));
          cell.style.background = alpha === 0 ? "var(--panel)" : `rgba(var(--heat), ${alpha})`;
          cell.title = `${home}-${away}: ${pct(probability)}`;
          grid.appendChild(cell);
        }
      }
      card.appendChild(grid);
      return card;
    }

    function matchSummary(match) {
      if (hasPlaceholderTeam(match)) {
        return "This knockout slot depends on group results, so the model waits for " +
          "confirmed countries before showing probabilities.";
      }
      const outcomes = [
        {label: `${match.home_team} win`, value: match.home_win},
        {label: "Draw", value: match.draw},
        {label: `${match.away_team} win`, value: match.away_win},
      ];
      const leader = outcomes.reduce((best, outcome) =>
        outcome.value > best.value ? outcome : best
      );
      const score = `${match.peak_score.home}-${match.peak_score.away}`;
      const bttsText = match.btts_yes >= 0.5
        ? `Both teams scoring is more likely than not at ${pct(match.btts_yes)}.`
        : `The model leans against both teams scoring at ${pct(match.btts_no)}.`;
      return `${leader.label} is the strongest result at ${pct(leader.value)}. ` +
        `The most likely score is ${score} at ${pct(match.peak_score.probability)}. ` +
        bttsText;
    }

    function hasPlaceholderTeam(match) {
      return [match.home_team, match.away_team].some((team) =>
        /\bgroup [a-l]\b|runner|third place/i.test(team)
      );
    }

    function metric(label, value) {
      const container = document.createElement("div");
      container.className = "metric";

      const labelNode = document.createElement("span");
      labelNode.textContent = label;
      container.appendChild(labelNode);

      const valueNode = document.createElement("strong");
      valueNode.textContent = pct(value);
      container.appendChild(valueNode);
      return container;
    }

    function cell(text, className) {
      const node = document.createElement("div");
      node.className = `cell ${className}`;
      node.textContent = text;
      return node;
    }

    renderMatch(0);
  </script>
</body>
</html>
