<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Score Prediction Explorer</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef4f1;
      --panel: #ffffff;
      --panel-alt: #e2eee9;
      --ink: #10231f;
      --muted: #465e57;
      --line: #c6d6cf;
      --accent: #0b5f4a;
      --accent-soft: #dceee7;
      --accent-mid: #b8d8cd;
      --accent-ink: #ffffff;
      --peak: #fff0bc;
      --peak-ink: #34270b;
      --heat: 11, 95, 74;
      font-family:
        ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }
    .app {
      display: grid;
      grid-template-columns: minmax(280px, 340px) 1fr;
      min-height: 100vh;
    }
    aside {
      border-right: 1px solid var(--line);
      background: #f8fbf9;
      padding: 22px;
      overflow: auto;
    }
    main {
      padding: 28px;
      overflow: auto;
    }
    h1, h2, h3, p { margin: 0; }
    h1 {
      font-size: 1.55rem;
      line-height: 1.08;
      letter-spacing: 0;
      text-wrap: balance;
    }
    h2 {
      font-size: 1.65rem;
      line-height: 1.16;
      letter-spacing: 0;
      text-wrap: balance;
    }
    h3 {
      font-size: 1rem;
      line-height: 1.25;
    }
    .sidebar-copy {
      margin-top: 9px;
      max-width: 34ch;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      text-wrap: pretty;
    }
    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }
    .picker-title {
      margin-top: 22px;
      font-size: 0.88rem;
      font-weight: 750;
    }
    .legend {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.25;
    }
    .sidebar-legend {
      margin-top: 16px;
      padding: 10px 0 2px;
    }
    .legend-scale {
      display: grid;
      grid-template-columns: repeat(4, 22px);
      gap: 4px;
    }
    .legend-swatch {
      display: block;
      height: 10px;
      border: 1px solid rgba(var(--heat), 0.3);
      border-radius: 999px;
      background: rgba(var(--heat), var(--alpha));
    }
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      max-height: calc(100vh - 230px);
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 2px;
    }
    .match-button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      padding: 12px;
      text-align: left;
      transition:
        background-color 180ms ease,
        border-color 180ms ease,
        color 180ms ease,
        transform 180ms ease;
    }
    .match-button:hover, .match-button:focus-visible {
      border-color: var(--accent);
      outline: none;
      transform: translateY(-1px);
    }
    .match-button:focus-visible {
      box-shadow: 0 0 0 3px var(--accent-mid);
    }
    .match-button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
    }
    .match-button strong {
      display: block;
      font-size: 0.94rem;
      line-height: 1.25;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .match-button-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.76rem;
      margin-top: 8px;
      color: var(--muted);
    }
    .match-button.active .match-button-meta {
      color: rgba(255, 255, 255, 0.82);
    }
    .kind-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      background: #f2f7f4;
      color: var(--muted);
      white-space: nowrap;
    }
    .match-button.active .kind-pill {
      border-color: rgba(255, 255, 255, 0.36);
      background: rgba(255, 255, 255, 0.14);
      color: var(--accent-ink);
    }
    .detail-stack {
      max-width: 980px;
    }
    .score-callout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-top: 18px;
      border: 1px solid var(--accent-mid);
      border-radius: 12px;
      background: var(--accent-soft);
      padding: 16px 18px;
    }
    .score-callout-label {
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 750;
    }
    .score-callout-value {
      margin-top: 3px;
      font-size: 2.1rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }
    .score-callout-chance {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.35;
      text-align: right;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    .tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-size: 0.86rem;
      padding: 7px 12px;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
    }
    .tab:focus-visible {
      outline: 3px solid var(--accent-mid);
      outline-offset: 2px;
    }
    .match-summary {
      margin-top: 16px;
      max-width: 70ch;
      color: var(--ink);
      font-size: 0.95rem;
      line-height: 1.5;
      text-wrap: pretty;
    }
    .methodology {
      margin-top: 16px;
      max-width: 72ch;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      padding: 16px;
    }
    .methodology p + p { margin-top: 10px; }
    .model-flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 8px;
      margin: 16px 0;
    }
    .model-step {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f7fbf9;
      padding: 12px;
    }
    .model-step strong {
      display: block;
      font-size: 0.88rem;
      line-height: 1.25;
    }
    .model-step span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }
    .method-visuals {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(220px, 0.85fr);
      gap: 14px;
      margin-top: 14px;
    }
    .method-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fbf9;
      padding: 14px;
    }
    .method-card h3 { margin-bottom: 10px; }
    .goal-bars {
      display: grid;
      gap: 7px;
    }
    .goal-bar-row {
      display: grid;
      grid-template-columns: 54px 1fr 48px;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
    }
    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
    }
    .mini-heatmap {
      display: grid;
      grid-template-columns: repeat(var(--mini-cols), 1fr);
      gap: 2px;
    }
    .mini-cell {
      aspect-ratio: 1;
      border-radius: 4px;
      background: rgba(var(--heat), var(--alpha));
    }
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 22px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      min-width: 128px;
      padding: 12px 13px;
    }
    .metric span {
      color: var(--muted);
      display: block;
      font-size: 0.78rem;
      line-height: 1.25;
    }
    .metric strong {
      display: block;
      font-size: 1.08rem;
      margin-top: 4px;
    }
    .heatmap-intro {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      max-width: 760px;
      margin-bottom: 10px;
    }
    .heatmap-note {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.4;
      text-align: right;
    }
    .heatmap-scroll {
      max-width: 100%;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .score-heatmap {
      display: grid;
      grid-template-columns: 54px repeat(var(--cols), minmax(54px, 1fr));
      max-width: 760px;
      border: 1px solid var(--line);
      background: var(--line);
      gap: 1px;
      border-radius: 10px;
      overflow: hidden;
    }
    .cell {
      min-height: 54px;
      display: grid;
      place-items: center;
      background: var(--panel);
      font-size: 0.78rem;
      line-height: 1.2;
      padding: 6px;
      text-align: center;
      white-space: pre-line;
      color: var(--ink);
    }
    .axis {
      background: var(--panel-alt);
      color: var(--muted);
      font-weight: 650;
    }
    .probability {
      transition:
        background-color 180ms ease,
        transform 180ms ease;
    }
    .probability:hover {
      transform: translateY(-1px);
    }
    .probability.highest-probability {
      box-shadow: inset 0 0 0 3px var(--accent);
      background: var(--peak) !important;
      color: var(--peak-ink);
      font-weight: 750;
    }
    .empty {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--muted);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
      .match-button:hover, .probability:hover { transform: none; }
    }
    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: 46vh;
        padding: 18px;
      }
      main { padding: 18px; }
      h1 { font-size: 1.38rem; }
      h2 { font-size: 1.35rem; }
      .score-callout {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }
      .score-callout-chance { text-align: left; }
      .heatmap-intro {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }
      .heatmap-note { text-align: left; }
      .match-list { max-height: 220px; }
      .model-flow, .method-visuals { grid-template-columns: 1fr; }
      .score-heatmap {
        grid-template-columns: 42px repeat(var(--cols), minmax(42px, 1fr));
      }
      .cell {
        min-height: 42px;
        font-size: 0.68rem;
      }
    }
  </style>
</head>

    const matches = report.matches || [];
    const list = document.getElementById("match-list");
    const detail = document.getElementById("detail");
    let selectedTab = "prediction";
    document.getElementById("model-meta").textContent =
      `Model run: scores up to ${report.model.max_goals} goals · ` +
      `as of ${report.window.as_of} · ${matches.length} matches`;

    function pct(value) {
      return `${(value * 100).toFixed(1)}%`;
    }

    function renderList(selectedIndex) {
      list.textContent = "";
      matches.forEach((match, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `match-button${index === selectedIndex ? " active" : ""}`;
        button.setAttribute("aria-pressed", index === selectedIndex ? "true" : "false");

        const strong = document.createElement("strong");
        strong.textContent = `${match.home_team} vs ${match.away_team}`;
        button.appendChild(strong);

        const label = document.createElement("span");
        label.className = "match-button-meta";
        const dateNode = document.createElement("span");
        dateNode.textContent = match.date;
        label.appendChild(dateNode);
        const statusNode = document.createElement("span");
        statusNode.className = "kind-pill";
        statusNode.textContent = match.actual_score ? "Played" : "This week";
        label.appendChild(statusNode);
        button.appendChild(label);

        button.addEventListener("click", () => renderMatch(index));
        list.appendChild(button);
      });
    }

    function renderMatch(index) {
      const match = matches[index];
      detail.textContent = "";
      renderList(index);
      if (!match) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No predictions found for this report.";
        detail.appendChild(empty);
        return;
      }

      const maxProbability = match.peak_score.probability;
      const cols = match.score_grid[0].length;
      const actual = match.actual_score
        ? `Played: final score ${match.actual_score.home}-${match.actual_score.away}`
        : "Upcoming fixture";

      const heading = document.createElement("h2");
      heading.textContent = `${match.home_team} vs ${match.away_team}`;
      detail.appendChild(heading);

      const meta = document.createElement("p");
      meta.className = "meta";
      meta.textContent = `${match.date} · ${actual}`;
      detail.appendChild(meta);

      renderTabs(index);
      if (selectedTab === "methodology") {
        renderMethodology(match);
        return;
      }

      const summaryCopy = document.createElement("p");
      summaryCopy.className = "match-summary";
      summaryCopy.textContent = matchSummary(match);
      detail.appendChild(summaryCopy);

      if (hasPlaceholderTeam(match)) {
        const placeholder = document.createElement("div");
        placeholder.className = "empty";
        placeholder.textContent =
          "Teams not set yet. Probabilities will show when the countries are confirmed.";
        detail.appendChild(placeholder);
        return;
      }

      const scoreCallout = document.createElement("div");
      scoreCallout.className = "score-callout";
      const scoreMain = document.createElement("div");
      const scoreLabel = document.createElement("div");
      scoreLabel.className = "score-callout-label";
      scoreLabel.textContent = "Most likely score";
      scoreMain.appendChild(scoreLabel);
      const scoreValue = document.createElement("div");
      scoreValue.className = "score-callout-value";
      scoreValue.textContent = `${match.peak_score.home}-${match.peak_score.away}`;
      scoreMain.appendChild(scoreValue);
      scoreCallout.appendChild(scoreMain);
      const scoreChance = document.createElement("p");
      scoreChance.className = "score-callout-chance";
      scoreChance.textContent = `${pct(match.peak_score.probability)} chance from the model`;
      scoreCallout.appendChild(scoreChance);
      scoreCallout.setAttribute(
        "aria-label",
        `Most likely score ${match.peak_score.home}-${match.peak_score.away} ` +
          `with ${pct(match.peak_score.probability)} chance from the model`,
      );
      detail.appendChild(scoreCallout);

      const summary = document.createElement("div");
      summary.className = "summary";
      summary.appendChild(metric(`${match.home_team} win`, match.home_win));
      summary.appendChild(metric("Draw", match.draw));
      summary.appendChild(metric(`${match.away_team} win`, match.away_win));
      summary.appendChild(metric("Both teams score", match.btts_yes));
      summary.appendChild(metric("One or both score 0", match.btts_no));
      detail.appendChild(summary);

      const heatmapIntro = document.createElement("div");
      heatmapIntro.className = "heatmap-intro";
      const heatmapTitle = document.createElement("h3");
      heatmapTitle.textContent = "Possible final scores";
      heatmapIntro.appendChild(heatmapTitle);
      const heatmapNote = document.createElement("p");
      heatmapNote.className = "heatmap-note";
      heatmapNote.textContent = "Rows are home goals. Columns are away goals.";
      heatmapIntro.appendChild(heatmapNote);
      detail.appendChild(heatmapIntro);

      const heatmapScroll = document.createElement("div");
      heatmapScroll.className = "heatmap-scroll";
      detail.appendChild(heatmapScroll);

      const heatmap = document.createElement("div");
      heatmap.className = "score-heatmap";
      heatmap.style.setProperty("--cols", String(cols));
      heatmap.id = "heatmap";
      heatmap.setAttribute(

        "Score chance heatmap. Rows are home goals and columns are away goals.",
      );
      heatmapScroll.appendChild(heatmap);

      heatmap.appendChild(cell("", "axis"));
      for (let away = 0; away < cols; away += 1) {
        heatmap.appendChild(cell(`Away ${away}`, "axis"));
      }
      match.score_grid.forEach((row, home) => {
        heatmap.appendChild(cell(`Home ${home}`, "axis"));
        row.forEach((probability, away) => {
          const intensity = Math.max(0.08, probability / maxProbability);
          const node = cell(`${home}-${away}\n${pct(probability)}`, "probability");
          node.style.background = `rgba(var(--heat), ${0.08 + intensity * 0.58})`;
          node.title = `${home}-${away}: ${pct(probability)}`;
          if (home === match.peak_score.home && away === match.peak_score.away) {

          }
          heatmap.appendChild(node);
        });
      });
    }

    function renderTabs(index) {
      const tabs = document.createElement("div");
      tabs.className = "tabs";
      tabs.setAttribute("role", "tablist");
      tabs.appendChild(tabButton("Prediction", "prediction", index));
      tabs.appendChild(tabButton("Methodology", "methodology", index));
      detail.appendChild(tabs);
    }

    function tabButton(label, tabName, index) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `tab${selectedTab === tabName ? " active" : ""}`;
      button.textContent = label;
      button.setAttribute("role", "tab");
      button.setAttribute("aria-selected", selectedTab === tabName ? "true" : "false");
      button.addEventListener("click", () => {
        selectedTab = tabName;
        renderMatch(index);
      });
      return button;
    }

    function renderMethodology(match) {
      const panel = document.createElement("div");
      panel.className = "methodology";
      const title = document.createElement("h3");
      title.textContent = "How this model turns scores into chances";
      panel.appendChild(title);

      [
        "This explorer uses an independent Poisson score model.",
        `For ${match.home_team} vs ${match.away_team}, it trains only on scored matches ` +
          `dated before ${match.date}.`,
      ].forEach((text) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = text;
        panel.appendChild(paragraph);
      });

      const flow = document.createElement("div");
      flow.className = "model-flow";
      [
        ["Past scores", "Use only matches before this date."],
        ["Scoring rates", "Estimate how often each side scores and concedes."],
        ["Poisson curves", "Turn goal rates into 0, 1, 2, 3... goal chances."],
        ["Score grid", "Combine home and away goal chances into exact scores."],
      ].forEach(([heading, copy]) => {
        const step = document.createElement("div");
        step.className = "model-step";
        const strong = document.createElement("strong");
        strong.textContent = heading;
        step.appendChild(strong);
        const span = document.createElement("span");
        span.textContent = copy;
        step.appendChild(span);
        flow.appendChild(step);
      });
      panel.appendChild(flow);

      const visuals = document.createElement("div");
      visuals.className = "method-visuals";
      visuals.appendChild(renderGoalBars(match));
      visuals.appendChild(renderMiniHeatmap(match));
      panel.appendChild(visuals);

      [
        "The heatmap shows exact-score probabilities. Rows are home goals and columns are " +
          "away goals.",
        "The numbers are model probabilities, not betting advice or proof of an edge.",
      ].forEach((text) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = text;
        panel.appendChild(paragraph);
      });
      detail.appendChild(panel);
    }

    function renderGoalBars(match) {
      const card = document.createElement("div");
      card.className = "method-card";
      const title = document.createElement("h3");
      title.textContent = "Goal curves";
      card.appendChild(title);
      const bars = document.createElement("div");
      bars.className = "goal-bars";
      const homeGoals = match.score_grid.map((row) =>
        row.reduce((total, probability) => total + probability, 0)
      );
      const awayGoals = match.score_grid[0].map((_, away) =>
        match.score_grid.reduce((total, row) => total + row[away], 0)
      );
      const visibleGoals = Math.min(5, homeGoals.length);
      for (let goal = 0; goal < visibleGoals; goal += 1) {
        bars.appendChild(goalBar(`${goal} goals`, homeGoals[goal], match.home_team));
        bars.appendChild(goalBar(`${goal} goals`, awayGoals[goal], match.away_team));
      }
      card.appendChild(bars);
      return card;
    }

    function goalBar(label, probability, team) {
      const row = document.createElement("div");
      row.className = "goal-bar-row";
      const labelNode = document.createElement("span");
      labelNode.textContent = label;
      row.appendChild(labelNode);
      const track = document.createElement("span");
      track.className = "bar-track";
      track.title = `${team} ${label}: ${pct(probability)}`;
      const fill = document.createElement("span");
      fill.className = "bar-fill";
      fill.style.width = `${Math.min(100, probability * 100).toFixed(1)}%`;
      track.appendChild(fill);
      row.appendChild(track);
      const value = document.createElement("span");
      value.textContent = pct(probability);
      row.appendChild(value);
      return row;
    }

    function renderMiniHeatmap(match) {
      const card = document.createElement("div");
      card.className = "method-card";
      const title = document.createElement("h3");
      title.textContent = "Score grid";
      card.appendChild(title);
      const grid = document.createElement("div");
      grid.className = "mini-heatmap";
      const rows = Math.min(5, match.score_grid.length);
      const cols = Math.min(5, match.score_grid[0].length);
      grid.style.setProperty("--mini-cols", String(cols));
      const maxProbability = match.peak_score.probability;
      for (let home = 0; home < rows; home += 1) {
        for (let away = 0; away < cols; away += 1) {
          const probability = match.score_grid[home][away];
          const cell = document.createElement("span");
          cell.className = "mini-cell";
          cell.style.setProperty(
            "--alpha",
            String(0.12 + Math.max(0.04, probability / maxProbability) * 0.58),
          );
          cell.title = `${home}-${away}: ${pct(probability)}`;
          grid.appendChild(cell);
        }
      }
      card.appendChild(grid);
      return card;
    }

    function matchSummary(match) {
      if (hasPlaceholderTeam(match)) {
        return "This knockout slot depends on group results, so the model waits for " +
          "confirmed countries before showing probabilities.";
      }
      const outcomes = [
        {label: `${match.home_team} win`, value: match.home_win},
        {label: "Draw", value: match.draw},
        {label: `${match.away_team} win`, value: match.away_win},
      ];
      const leader = outcomes.reduce((best, outcome) =>
        outcome.value > best.value ? outcome : best
      );
      const score = `${match.peak_score.home}-${match.peak_score.away}`;
      const bttsText = match.btts_yes >= 0.5
        ? `Both teams scoring is more likely than not at ${pct(match.btts_yes)}.`
        : `The model leans against both teams scoring at ${pct(match.btts_no)}.`;
      return `${leader.label} is the strongest result at ${pct(leader.value)}. ` +
        `The most likely score is ${score} at ${pct(match.peak_score.probability)}. ` +
        bttsText;
    }

    function hasPlaceholderTeam(match) {
      return [match.home_team, match.away_team].some((team) =>
        /\bgroup [a-l]\b|runner|third place/i.test(team)
      );
    }

    function metric(label, value) {
      const container = document.createElement("div");
      container.className = "metric";

      const labelNode = document.createElement("span");
      labelNode.textContent = label;
      container.appendChild(labelNode);

      const valueNode = document.createElement("strong");
      valueNode.textContent = pct(value);
      container.appendChild(valueNode);
      return container;
    }

    function cell(text, className) {
      const node = document.createElement("div");
      node.className = `cell ${className}`;
      node.textContent = text;
      return node;
    }

    renderMatch(0);
